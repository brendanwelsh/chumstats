<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ballshark — Overlay</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/overlay.css">
</head>
<body>
  <div id="root" class="overlay-root">

    <!-- ===== LIVE / LAST MATCH: BARL-style scoreboard ===== -->
    <section id="barl" class="barl">
      <!-- Header bar: team A | scores + clock | team B -->
      <header class="bh">
        <div class="bh-team bh-team-0">
          <div class="bh-team-name" id="bh-t0-name">Blue</div>
        </div>
        <div class="bh-center">
          <div class="bh-score bh-score-0" id="bh-t0-score">0</div>
          <div class="bh-clock">
            <span id="bh-clock">--:--</span>
            <span id="bh-ot" class="bh-ot" hidden>OT</span>
          </div>
          <div class="bh-score bh-score-1" id="bh-t1-score">0</div>
        </div>
        <div class="bh-team bh-team-1">
          <div class="bh-team-name" id="bh-t1-name">Orange</div>
        </div>
      </header>

      <!-- Two scoreboards side by side -->
      <div class="bb">
        <table class="bt bt-0">
          <thead>
            <tr>
              <th class="bt-name">Player</th>
              <th>Score</th>
              <th>Goals</th>
              <th>Shots</th>
              <th>Assists</th>
              <th>Saves</th>
            </tr>
          </thead>
          <tbody id="bt-0-rows"></tbody>
        </table>
        <table class="bt bt-1">
          <thead>
            <tr>
              <th class="bt-name">Player</th>
              <th>Score</th>
              <th>Goals</th>
              <th>Shots</th>
              <th>Assists</th>
              <th>Saves</th>
            </tr>
          </thead>
          <tbody id="bt-1-rows"></tbody>
        </table>
      </div>

      <!-- Optional last-match footer (mode-last only) -->
      <div class="bf" id="bf">
        <div class="bf-result" id="bf-result"></div>
        <div class="bf-meta" id="bf-meta"></div>
      </div>
    </section>

    <!-- ===== SESSION TRACKER ===== -->
    <section id="sess" class="sess">
      <div class="sess-row">
        <div class="sess-wl"><b id="sess-wl">0-0</b></div>
        <div class="sess-divider"></div>
        <div class="sess-streak"><b id="sess-streak">—</b><span>streak</span></div>
        <div class="sess-divider"></div>
        <div class="sess-form" id="sess-form"></div>
      </div>
      <div class="sess-totals" id="sess-totals">
        Goals 0  ·  Assists 0  ·  Saves 0  ·  Shots 0  ·  Demos 0
      </div>
    </section>

    <!-- ===== ME-ONLY MINI ===== -->
    <section id="me" class="me">
      <div class="me-name" id="me-name">You</div>
      <div class="me-line">
        <span><b id="me-g">0</b><span class="me-l">Goals</span></span>
        <span><b id="me-a">0</b><span class="me-l">Assists</span></span>
        <span><b id="me-sv">0</b><span class="me-l">Saves</span></span>
        <span><b id="me-sh">0</b><span class="me-l">Shots</span></span>
      </div>
    </section>

    <!-- Connection dot, hidden by default -->
    <div class="conn-dot" id="conn-dot" title="connection"></div>

    <!-- Transient toast for goal / crossbar -->
    <div id="toast" class="toast" hidden></div>
  </div>

  <script>
    window.BALLSHARK_SELF_NAME = "@ChumtheWaters";
  </script>
  <script src="/static/overlay.js"></script>
</body>
</html>
